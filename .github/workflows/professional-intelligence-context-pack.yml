name: professional-intelligence-context-pack

on:
  pull_request:
    paths:
      - "schemas/professional-intelligence-context-pack.schema.json"
      - "examples/professional-intelligence/context-pack.example.json"
      - "scripts/validate_professional_intelligence_context_pack.py"
      - ".github/workflows/professional-intelligence-context-pack.yml"
  push:
    branches:
      - main
    paths:
      - "schemas/professional-intelligence-context-pack.schema.json"
      - "examples/professional-intelligence/context-pack.example.json"
      - "scripts/validate_professional_intelligence_context_pack.py"
      - ".github/workflows/professional-intelligence-context-pack.yml"

jobs:
  validate-context-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install validation dependency
        run: python -m pip install jsonschema
      - name: Validate Professional Intelligence context pack
        run: python scripts/validate_professional_intelligence_context_pack.py
