name: test-finance-source-of-truth

on:
  push:
    branches:
      - main
      - test/runtime-source-of-truth
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-finance-source-of-truth:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/memoryd/requirements.txt -r services/finance_saa/requirements.txt

      - name: Run finance source-of-truth tests
        run: |
          python -m unittest discover -s services/finance_saa/tests -p 'test_*.py' -v
