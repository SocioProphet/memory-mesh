name: slash-topic-memory-profile

on:
  pull_request:
    paths:
      - "schemas/slash-topic-memory-profile.schema.json"
      - "examples/slash-topics/memory-profile.example.json"
      - "scripts/validate_slash_topic_memory_profile.py"
      - "specs/slash-topic-memory-profile.v1.yaml"
      - ".github/workflows/slash-topic-memory-profile.yml"
  push:
    branches:
      - main
    paths:
      - "schemas/slash-topic-memory-profile.schema.json"
      - "examples/slash-topics/memory-profile.example.json"
      - "scripts/validate_slash_topic_memory_profile.py"
      - "specs/slash-topic-memory-profile.v1.yaml"
      - ".github/workflows/slash-topic-memory-profile.yml"

jobs:
  validate-slash-topic-memory-profile:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install validation dependency
        run: python -m pip install jsonschema
      - name: Validate Slash Topic memory profile
        run: python scripts/validate_slash_topic_memory_profile.py
