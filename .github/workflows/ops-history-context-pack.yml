name: ops-history-context-pack

on:
  pull_request:
    paths:
      - 'schemas/ops-history-context-pack.schema.json'
      - 'examples/ops-history/**'
      - 'scripts/validate_ops_history_context_pack.py'
      - '.github/workflows/ops-history-context-pack.yml'
  push:
    branches:
      - main
      - ops-history-contracts
    paths:
      - 'schemas/ops-history-context-pack.schema.json'
      - 'examples/ops-history/**'
      - 'scripts/validate_ops_history_context_pack.py'
      - '.github/workflows/ops-history-context-pack.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install jsonschema
      - run: python scripts/validate_ops_history_context_pack.py
