apiVersion: tritrpc.socioprophet.io/v1alpha1
kind: ServiceContract
metadata:
  name: slash-topic-memory-profile.v1
  title: Slash Topic Memory Profile contract for Lattice query routing
  status: draft
  owners:
    - SocioProphet
  source_of_truth:
    - schemas/slash-topic-memory-profile.schema.json
    - examples/slash-topics/memory-profile.example.json
    - scripts/validate_slash_topic_memory_profile.py
  coordinates:
    slash_topics_issue: "https://github.com/SocioProphet/slash-topics/issues/19"
spec:
  purpose: >-
    Defines the repo-native Memory Mesh contract that attaches a memory posture
    to a Slash Topic scope. This contract provides the governance envelope that
    Lattice query routing requires: Slash Topics scope, New Hope membrane
    admission, Memory Mesh profile, lab profile selection, and physical backend
    routing. It also defines dry-run behaviour so that query routing can produce
    memory event and evidence references without performing any recall or
    writeback.
  transport:
    normative:
      protocol: TriTRPC v1
      binding: prophet-platform stream binding over unix:// or tcp://
    compatibility_edges:
      - protocol: JSON document
        contract: schemas/slash-topic-memory-profile.schema.json
  lifecycle:
    phase: p0-domain-pack
    dependency:
      - memory.mesh.v1
  types:
    SlashTopicScope:
      description: >-
        Identifies a Slash Topic and the New Hope membrane that controls
        admission for that topic.
      fields:
        topic: string          # e.g. "/eng/reliability"
        membraneId: string     # New Hope membrane admission ID
        channelRef: string?    # optional channel within the scope

    RecallPolicy:
      description: >-
        Controls how memory is recalled within a Slash Topic scope.
      fields:
        scope:
          enum:
            - slash-topic-scoped
            - session-scoped
            - read-only
        sensitivePayloadStorage:
          enum:
            - disallowed           # default; no raw sensitive content stored
            - summarized-only
            - allowed-with-redaction
        topK: int                  # 1–50
        scopeOrder: [string]?      # ordered scope dimensions for resolution
        includeRelations: bool     # default false; requires explicit allow policy
        includeRawEvents: bool     # default false; requires explicit allow policy

    WritebackPolicy:
      description: >-
        Controls memory writeback. In dry-run mode this must resolve to
        no-writeback.
      fields:
        enabled: bool
        dryRunMode:
          enum:
            - no-writeback         # required default in dry-run
            - event-refs-only
            - summarized-only
        allowedMemoryClasses: [string]?

    RetentionConfig:
      fields:
        class: string
        evidenceRequired: bool
        ttlDays: int?

    RedactionConfig:
      fields:
        enabled: bool
        sensitivityThreshold:
          enum: [public, internal, confidential, restricted]
        redactedFields: [string]?

    SummarizationConfig:
      fields:
        enabled: bool
        maxTokens: int?
        summaryClass: string?

    PromotionConfig:
      fields:
        enabled: bool
        promotionTargetScope: string?
        requiresApproval: bool

    ForgettingConfig:
      fields:
        enabled: bool
        policy:
          enum:
            - explicit-delete-only
            - ttl-based
            - evidence-driven

    LabProfile:
      description: >-
        Tunes embedding, NLP, and multimodal behaviour for this scope.
        Selecting a lab profile never launches background lab jobs; it
        configures runtime behaviour only.
      fields:
        embeddingModel: string?
        nlpPipeline: string?
        multimodalEnabled: bool
        launchLabJobs:
          const: false             # invariant; lab jobs are never triggered here

    QueryRoutingDryRunPlan:
      description: >-
        Explicit mapping to Lattice QueryRoutingDryRunPlan fields. Produced
        during a dry-run pass without reading or writing memory.
      fields:
        memoryProfileRef: string   # stable URI for the active memory profile
        memoryEventRef: string     # dry-run event ref; no recall or writeback occurs

    SlashTopicMemoryProfile:
      description: >-
        Top-level contract document. Combines all sub-policies and the
        dry-run plan into a single governed profile attached to a Slash Topic.
      fields:
        schemaVersion:
          const: "v0.1"
        memoryProfileRef: string   # Maps to QueryRoutingDryRunPlan.memoryProfileRef
        slashTopicScope: SlashTopicScope
        recallPolicy: RecallPolicy
        writebackPolicy: WritebackPolicy
        retention: RetentionConfig
        redaction: RedactionConfig?
        summarization: SummarizationConfig?
        promotion: PromotionConfig?
        forgetting: ForgettingConfig?
        labProfile: LabProfile?
        dryRun:
          fields:
            enabled: bool
            queryRoutingPlan: QueryRoutingDryRunPlan?
        evidenceRefs: [string]

  execution_rules:
    recall:
      mandatory_enforcement:
        - sensitivePayloadStorage must be 'disallowed' by default; promotion
          to 'summarized-only' or 'allowed-with-redaction' requires an
          explicit policy decision reference
        - includeRawEvents and includeRelations require explicit allow entries
          in the compiled workload config
        - scopeOrder resolution follows the same precedence as memory.mesh.v1
          (request override → profile → default)
        - topK must not exceed the memory.mesh.v1 recall_top_k_limit
    writeback:
      mandatory_enforcement:
        - when dryRun.enabled is true, writebackPolicy.dryRunMode must be
          'no-writeback' and no memory entry may be persisted
        - when writebackPolicy.enabled is false, all writeback attempts are
          denied regardless of memory class
        - only memory classes listed in writebackPolicy.allowedMemoryClasses
          may be written when writeback is enabled
        - emit memory.write.accepted or memory.write.rejected event for every
          writeback attempt
    dry_run:
      mandatory_enforcement:
        - dry-run pass must produce QueryRoutingDryRunPlan with both
          memoryProfileRef and memoryEventRef populated
        - no recall call is issued to the backend store during a dry-run pass
        - no writeback call is issued during a dry-run pass
        - dry-run events are typed memory.dry-run.planned and must carry
          evidence_refs
    lab_profile:
      mandatory_enforcement:
        - labProfile.launchLabJobs must always be false
        - lab profile selection takes effect at recall/embed time; it never
          triggers a background compute job
    retention_and_forgetting:
      mandatory_enforcement:
        - when retention.evidenceRequired is true, a memory entry without an
          evidenceRef must be rejected at writeback
        - forgetting policy 'explicit-delete-only' suppresses all automatic
          expiry; an explicit operator action is required to remove entries
        - ttl-based forgetting must honour retention.ttlDays

  events:
    required_fields:
      - event_id
      - event_type
      - event_version
      - created_at
      - workload_id
      - slash_topic
      - membrane_id
      - payload
      - evidence_refs
    vocabulary:
      - memory.slash-topic.profile.applied
      - memory.slash-topic.recall.started
      - memory.slash-topic.recall.completed
      - memory.slash-topic.recall.denied
      - memory.slash-topic.write.accepted
      - memory.slash-topic.write.rejected
      - memory.slash-topic.dry-run.planned
      - memory.slash-topic.promotion.requested
      - memory.slash-topic.promotion.approved
      - memory.slash-topic.promotion.denied
      - memory.slash-topic.forgotten

  dry_run_contract:
    description: >-
      When Lattice query routing runs a dry-run pass it must resolve the active
      SlashTopicMemoryProfile for the requested topic scope, set dryRun.enabled
      to true, and return a QueryRoutingDryRunPlan without reading from or
      writing to any memory backend.
    lattice_field_mapping:
      memoryProfileRef: SlashTopicMemoryProfile.memoryProfileRef
      memoryEventRef: SlashTopicMemoryProfile.dryRun.queryRoutingPlan.memoryEventRef

  migration:
    p0_goals:
      - define schema and fixture for slash-topic-scoped memory profiles
      - provide dry-run pass contract aligned with Lattice QueryRoutingDryRunPlan
      - no raw sensitive payload storage by default
      - no memory writeback in dry-run mode
    follow_on:
      - integrate with New Hope membrane admission enforcement
      - per-topic lab profile registry
      - promotion approval workflow surfaced through Lattice
