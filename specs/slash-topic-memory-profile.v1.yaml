apiVersion: tritrpc.socioprophet.io/v1alpha1
kind: ServiceContract
metadata:
  name: slash-topic-memory-profile.v1
  title: Slash Topic Memory Profile contract for Lattice query routing
  status: draft
  owners:
    - SocioProphet
  source_of_truth:
    - schemas/slash-topic-memory-profile.schema.json
    - examples/slash-topics/memory-profile.example.json
    - scripts/validate_slash_topic_memory_profile.py
  coordinates:
    slash_topics_issue: "https://github.com/SocioProphet/slash-topics/issues/19"
    sociosphere_topology_pr: "https://github.com/SocioProphet/sociosphere/pull/236"
    prophet_platform_query_roles_pr: "https://github.com/SocioProphet/prophet-platform/pull/290"
    sherlock_role_surfaces_pr: "https://github.com/SocioProphet/sherlock-search/pull/26"
spec:
  purpose: >-
    Defines the repo-native Memory Mesh contract that attaches a memory posture
    to a Slash Topic scope. This contract provides the governance envelope that
    Lattice query routing requires: Slash Topics public query/governance surface,
    New Hope internal membrane/runtime substrate, Memory Mesh profile, lab profile
    selection, and physical backend routing. It also defines dry-run behaviour so
    query routing can produce memory event, topology role, and evidence references
    without performing recall or writeback.

  role_model:
    publicSurfaceRef:
      const: slash-topics-public-surface
      meaning: Slash Topics is the public query/governance surface.
    runtimeSubstrateRef:
      const: new-hope-runtime-substrate
      meaning: New Hope is the internal membrane/runtime substrate.
    runtimeAliasRef:
      const: slash-topics-runtime-alias
      meaning: Future Slash Topics runtime aliases remain explicit and non-surprising.
    compatibilityRef:
      const: new-hope-compatibility
      meaning: New Hope compatibility is preserved instead of hidden behind a rename.

  transport:
    normative:
      protocol: TriTRPC v1
      binding: prophet-platform stream binding over unix:// or tcp://
    compatibility_edges:
      - protocol: JSON document
        contract: schemas/slash-topic-memory-profile.schema.json

  lifecycle:
    phase: p0-domain-pack
    dependency:
      - memory.mesh.v1

  types:
    SlashTopicScope:
      description: >-
        Identifies a Slash Topic and the New Hope membrane that controls
        admission for that topic.
      fields:
        topic: string
        membraneId: string
        channelRef: string?

    TopologyRoles:
      description: >-
        Explicit Slash Topics / New Hope topology role references. Memory Mesh
        attaches to Slash Topic scope while preserving New Hope as the runtime
        substrate and compatibility surface.
      fields:
        publicSurfaceRef:
          const: slash-topics-public-surface
        runtimeSubstrateRef:
          const: new-hope-runtime-substrate
        runtimeAliasRef:
          const: slash-topics-runtime-alias
        compatibilityRef:
          const: new-hope-compatibility

    QueryRoutingDryRunPlan:
      description: >-
        Explicit mapping to Lattice QueryRoutingDryRunPlan fields. Produced
        during a dry-run pass without reading or writing memory.
      fields:
        memoryProfileRef: string
        memoryEventRef: string
        publicSurfaceRef:
          const: slash-topics-public-surface
        runtimeSubstrateRef:
          const: new-hope-runtime-substrate
        runtimeAliasRef:
          const: slash-topics-runtime-alias
        compatibilityRef:
          const: new-hope-compatibility

    SlashTopicMemoryProfile:
      description: >-
        Top-level contract document. Combines all sub-policies, topology role
        refs, and the dry-run plan into a single governed profile attached to a
        Slash Topic.
      fields:
        schemaVersion:
          const: "v0.1"
        memoryProfileRef: string
        slashTopicScope: SlashTopicScope
        topologyRoles: TopologyRoles
        recallPolicy: RecallPolicy
        writebackPolicy: WritebackPolicy
        retention: RetentionConfig
        redaction: RedactionConfig?
        summarization: SummarizationConfig?
        promotion: PromotionConfig?
        forgetting: ForgettingConfig?
        labProfile: LabProfile?
        dryRun:
          fields:
            enabled: bool
            queryRoutingPlan: QueryRoutingDryRunPlan?
        evidenceRefs: string[]

  execution_rules:
    topology_roles:
      mandatory_enforcement:
        - publicSurfaceRef must be slash-topics-public-surface.
        - runtimeSubstrateRef must be new-hope-runtime-substrate.
        - runtimeAliasRef must be slash-topics-runtime-alias.
        - compatibilityRef must be new-hope-compatibility.
        - dryRun.queryRoutingPlan must mirror the same four role refs emitted by Lattice QueryRoutingDryRunPlan.
        - Memory Mesh must attach to Slash Topic scope and must not treat New Hope as the public surface or hide it behind an implicit rename.
    recall:
      mandatory_enforcement:
        - sensitivePayloadStorage must be 'disallowed' by default; promotion to 'summarized-only' or 'allowed-with-redaction' requires an explicit policy decision reference.
        - includeRawEvents and includeRelations require explicit allow entries in the compiled workload config.
        - scopeOrder resolution follows memory.mesh.v1 precedence.
        - topK must not exceed the memory.mesh.v1 recall_top_k_limit.
    writeback:
      mandatory_enforcement:
        - when dryRun.enabled is true, writebackPolicy.dryRunMode must be 'no-writeback' and no memory entry may be persisted.
        - when writebackPolicy.enabled is false, all writeback attempts are denied regardless of memory class.
        - only memory classes listed in writebackPolicy.allowedMemoryClasses may be written when writeback is enabled.
        - emit memory.write.accepted or memory.write.rejected event for every writeback attempt.
    dry_run:
      mandatory_enforcement:
        - dry-run pass must produce QueryRoutingDryRunPlan with memoryProfileRef, memoryEventRef, publicSurfaceRef, runtimeSubstrateRef, runtimeAliasRef, and compatibilityRef populated.
        - no recall call is issued to the backend store during a dry-run pass.
        - no writeback call is issued during a dry-run pass.
        - dry-run events are typed memory.dry-run.planned and must carry evidence_refs.
    lab_profile:
      mandatory_enforcement:
        - labProfile.launchLabJobs must always be false.
        - lab profile selection takes effect at recall/embed time; it never triggers a background compute job.
    retention_and_forgetting:
      mandatory_enforcement:
        - when retention.evidenceRequired is true, a memory entry without an evidenceRef must be rejected at writeback.
        - forgetting policy 'explicit-delete-only' suppresses all automatic expiry; an explicit operator action is required to remove entries.
        - ttl-based forgetting must honour retention.ttlDays.

  events:
    required_fields:
      - event_id
      - event_type
      - event_version
      - created_at
      - workload_id
      - slash_topic
      - membrane_id
      - public_surface_ref
      - runtime_substrate_ref
      - runtime_alias_ref
      - compatibility_ref
      - payload
      - evidence_refs
    vocabulary:
      - memory.slash-topic.profile.applied
      - memory.slash-topic.recall.started
      - memory.slash-topic.recall.completed
      - memory.slash-topic.recall.denied
      - memory.slash-topic.write.accepted
      - memory.slash-topic.write.rejected
      - memory.slash-topic.dry-run.planned
      - memory.slash-topic.promotion.requested
      - memory.slash-topic.promotion.approved
      - memory.slash-topic.promotion.denied
      - memory.slash-topic.forgotten

  dry_run_contract:
    description: >-
      When Lattice query routing runs a dry-run pass it must resolve the active
      SlashTopicMemoryProfile for the requested topic scope, set dryRun.enabled
      to true, and return a QueryRoutingDryRunPlan without reading from or writing
      to any memory backend.
    lattice_field_mapping:
      memoryProfileRef: SlashTopicMemoryProfile.memoryProfileRef
      memoryEventRef: SlashTopicMemoryProfile.dryRun.queryRoutingPlan.memoryEventRef
      publicSurfaceRef: SlashTopicMemoryProfile.topologyRoles.publicSurfaceRef
      runtimeSubstrateRef: SlashTopicMemoryProfile.topologyRoles.runtimeSubstrateRef
      runtimeAliasRef: SlashTopicMemoryProfile.topologyRoles.runtimeAliasRef
      compatibilityRef: SlashTopicMemoryProfile.topologyRoles.compatibilityRef

  migration:
    p0_goals:
      - define schema and fixture for slash-topic-scoped memory profiles
      - provide dry-run pass contract aligned with Lattice QueryRoutingDryRunPlan
      - enforce explicit Slash Topics public surface and New Hope runtime substrate role refs
      - no raw sensitive payload storage by default
      - no memory writeback in dry-run mode
    follow_on:
      - integrate with New Hope membrane admission enforcement
      - per-topic lab profile registry
      - promotion approval workflow surfaced through Lattice
