apiVersion: apps/v1
kind: Deployment
metadata:
  name: memoryd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memoryd
  template:
    metadata:
      labels:
        app: memoryd
    spec:
      containers:
        - name: memoryd
          image: REGION-docker.pkg.dev/PROJECT/REPO/memoryd@sha256:REPLACE_ME
          ports:
            - containerPort: 8787
              name: http
          env:
            - name: MEMORYD_REQUIRE_API_KEY
              value: "true"
            - name: MEMORYD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: memorymesh-secrets
                  key: MEMORYD_API_KEY
            - name: MEMORYMESH_STORE_URI
              valueFrom:
                secretKeyRef:
                  name: memorymesh-secrets
                  key: MEMORYMESH_STORE_URI
            - name: MEMORYMESH_VECTOR_BACKEND
              value: qdrant
            - name: QDRANT_URL
              value: http://qdrant:6333
            - name: QDRANT_COLLECTION
              value: memorymesh-review
            - name: QDRANT_ENABLED
              value: "true"
            - name: MEMORYMESH_VECTOR_SIZE
              value: "256"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8787
            initialDelaySeconds: 10
            periodSeconds: 10
